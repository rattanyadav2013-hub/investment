<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Portfolio Matrix</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        background-color: #030712;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.08), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.08), transparent 25%);
        color: #f8fafc;
        font-family: 'Space Grotesk', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
    }

    /* Animated background grid */
    body::before {
        content: '';
        position: absolute;
        width: 200%; height: 200%;
        background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
        animation: gridMove 20s linear infinite;
        z-index: -1;
    }

    @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
    }

    .dashboard {
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        z-index: 1;
    }

    .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .main-display {
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .main-display::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(transparent, transparent, transparent, #0ea5e9);
        animation: rotate 4s linear infinite;
        opacity: 0.1;
        z-index: -1;
    }

    @keyframes rotate { 100% { transform: rotate(360deg); } }

    h1 {
        font-size: 1.2rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 10px;
    }

    /* Monospace font for the ticking numbers so they don't jump around */
    .ticking-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 4rem;
        font-weight: 700;
        background: linear-gradient(to right, #38bdf8, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
    }

    .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .static-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
    }

    .static-title {
        color: #64748b;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    .static-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.8rem;
        color: #e2e8f0;
    }

    .live-usdt-card {
        background: linear-gradient(145deg, rgba(20, 184, 166, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
        border: 1px solid rgba(20, 184, 166, 0.3);
        box-shadow: 0 0 20px rgba(20, 184, 166, 0.1);
    }

    .live-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        background-color: #10b981;
        border-radius: 50%;
        margin-right: 8px;
        box-shadow: 0 0 10px #10b981;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.5; }
    }

    @media (max-width: 768px) {
        .grid-3 { grid-template-columns: 1fr; }
        .ticking-value { font-size: 2.5rem; }
    }
</style>
</head>
<body>

<div class="dashboard">
    <div class="glass-card main-display">
        <h1>Total Net Worth (Live)</h1>
        <div class="ticking-value" id="total-val">₹0.00000000</div>
    </div>

    <div class="grid-3">
        <div class="static-card">
            <div class="static-title">Equity (Constant)</div>
            <div class="static-value">₹3,912.41</div>
        </div>
        <div class="static-card">
            <div class="static-title">Gold (Constant)</div>
            <div class="static-value">₹389.74</div>
        </div>
        <div class="static-card">
            <div class="static-title">Cash (Constant)</div>
            <div class="static-value">₹110.00</div>
        </div>
    </div>

    <div class="glass-card static-card live-usdt-card">
        <div class="static-title"><span class="live-indicator"></span>USDT (Compounding @ 10%/yr)</div>
        <div class="static-value" id="usdt-val" style="color: #2dd4bf; font-size: 2.2rem; margin-top: 10px;">₹190.00000000</div>
    </div>
</div>

<script>
    // --- PORTFOLIO CONSTANTS ---
    const equity = 3912.41;
    const gold = 389.74;
    const cash = 110.00;
    const staticTotal = equity + gold + cash; // ₹4,412.15
    
    const initialUSDTQuantity = 2;
    const exchangeRateINR = 95.00; // 1 USDT = 95 INR
    const initialUSDTValueINR = initialUSDTQuantity * exchangeRateINR; // ₹190.00
    
    const annualGrowthRate = 0.10; // 10%
    const secondsInYear = 31536000; // 365 * 24 * 60 * 60

    // Capture the exact millisecond the user opens the page
    const startTime = Date.now();

    function updateTicker() {
        // Calculate how many seconds have passed since the page loaded
        const now = Date.now();
        const elapsedSeconds = (now - startTime) / 1000;
        
        // Convert elapsed seconds to a fraction of a year
        const elapsedYears = elapsedSeconds / secondsInYear;
        
        // Continuous compounding formula: Future Value = Principal * e^(rate * time)
        const compoundedUSDTValueINR = initialUSDTValueINR * Math.exp(annualGrowthRate * elapsedYears);
        
        // Add live USDT value to the static assets
        const totalNetWorth = staticTotal + compoundedUSDTValueINR;
        
        // Update the HTML (using 8 decimal places so you can see it move every frame)
        document.getElementById('usdt-val').innerText = '₹' + compoundedUSDTValueINR.toFixed(8);
        document.getElementById('total-val').innerText = '₹' + totalNetWorth.toFixed(8);
        
        // Ask the browser to run this function again on the next animation frame (approx 60 times a second)
        requestAnimationFrame(updateTicker);
    }

    // Start the loop
    updateTicker();
</script>

</body>
</html>
