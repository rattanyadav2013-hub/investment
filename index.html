<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Portfolio Matrix</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        background-color: #02040a;
        color: #f8fafc;
        font-family: 'Space Grotesk', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
    }

    #particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .dashboard {
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        gap: 30px;
        z-index: 1;
    }

    .glass-card {
        background: rgba(10, 15, 30, 0.7);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(0, 242, 254, 0.15);
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        position: relative;
    }

    .main-display {
        text-align: center;
        border: 1px solid rgba(56, 189, 248, 0.25);
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.1), inset 0 0 20px rgba(56, 189, 248, 0.05);
    }

    .main-display::before {
        content: '';
        position: absolute;
        top: 0;
        left: 10%;
        width: 80%;
        height: 1px;
        background: linear-gradient(90deg, transparent, #38bdf8, #2dd4bf, transparent);
    }

    h1 {
        font-size: 1.1rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 15px;
    }

    .ticking-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 4.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #38bdf8 0%, #2dd4bf 50%, #059669 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 50px rgba(45, 212, 191, 0.25);
    }

    .rupee {
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
    }

    .static-card {
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .static-card:hover {
        transform: translateY(-5px);
        border-color: rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.02);
    }

    .static-title {
        color: #475569;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
    }

    .static-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.9rem;
        color: #f1f5f9;
    }

    .live-usdt-card {
        background: linear-gradient(180deg, rgba(20, 184, 166, 0.05) 0%, rgba(10, 15, 30, 0.7) 100%);
        border: 1px solid rgba(20, 184, 166, 0.25);
        box-shadow: 0 10px 30px rgba(20, 184, 166, 0.05);
    }

    .live-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #2dd4bf;
        border-radius: 50%;
        margin-right: 10px;
        box-shadow: 0 0 12px #2dd4bf;
        animation: pulse 2s infinite;
        vertical-align: middle;
    }

    @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 8px #2dd4bf; }
        50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 16px #2dd4bf; }
        100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 8px #2dd4bf; }
    }

    @media (max-width: 768px) {
        .grid-3 { grid-template-columns: 1fr; gap: 15px; }
        .ticking-value { font-size: 2.8rem; }
    }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="dashboard">
    <div class="glass-card main-display">
        <h1>Total Net Worth</h1>
        <div class="ticking-value" id="total-val"><span class="rupee">&#8377;</span>0.00000000</div>
    </div>

    <div class="grid-3">
        <div class="static-card">
            <div class="static-title">Equity</div>
            <div class="static-value"><span class="rupee">&#8377;</span>3,912.41</div>
        </div>
        <div class="static-card">
            <div class="static-title">Gold</div>
            <div class="static-value"><span class="rupee">&#8377;</span>389.74</div>
        </div>
        <div class="static-card">
            <div class="static-title">Cash</div>
            <div class="static-value"><span class="rupee">&#8377;</span>110.00</div>
        </div>
    </div>

    <div class="glass-card static-card live-usdt-card">
        <div class="static-title"><span class="live-indicator"></span>USDT (Compounding @ 10%/yr)</div>
        <div class="static-value" id="usdt-val" style="color: #2dd4bf; font-size: 2.4rem; margin-top: 10px;"><span class="rupee">&#8377;</span>190.00000000</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = Math.random() * 0.2 - 0.1;
            this.speedY = Math.random() * -0.3 - 0.1;
            this.alpha = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.y < 0) {
                this.y = canvas.height;
                this.x = Math.random() * canvas.width;
            }
        }
        draw() {
            ctx.fillStyle = `rgba(56, 189, 248, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 60; i++) {
        particles.push(new Particle());
    }

    const equity = 3912.41;
    const gold = 389.74;
    const cash = 110.00;
    const staticTotal = equity + gold + cash;
    
    const initialUSDTQuantity = 2;
    const exchangeRateINR = 95.00;
    const initialUSDTValueINR = initialUSDTQuantity * exchangeRateINR;
    
    const annualGrowthRate = 0.10;
    const secondsInYear = 31536000;

    // The Universal Hardcoded Timestamp. Change this to your exact starting date and time.
    const startTime = new Date("2026-06-01T00:00:00Z").getTime();

    function updateDashboard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }

        const now = Date.now();
        const elapsedSeconds = (now - startTime) / 1000;
        
        // Prevent negative compounding if the start date is set in the future
        const validElapsedSeconds = Math.max(0, elapsedSeconds);
        const elapsedYears = validElapsedSeconds / secondsInYear;
        
        const compoundedUSDTValueINR = initialUSDTValueINR * Math.exp(annualGrowthRate * elapsedYears);
        const totalNetWorth = staticTotal + compoundedUSDTValueINR;
        
        document.getElementById('usdt-val').innerHTML = '<span class="rupee">&#8377;</span>' + compoundedUSDTValueINR.toFixed(8);
        document.getElementById('total-val').innerHTML = '<span class="rupee">&#8377;</span>' + totalNetWorth.toFixed(8);
        
        requestAnimationFrame(updateDashboard);
    }

    updateDashboard();
</script>

</body>
</html>
