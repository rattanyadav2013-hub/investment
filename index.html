<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Portfolio Matrix</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        background-color: #030712;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.08), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.08), transparent 25%);
        color: #f8fafc;
        font-family: 'Space Grotesk', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
    }

    body::before {
        content: '';
        position: absolute;
        width: 200%; height: 200%;
        background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
        animation: gridMove 20s linear infinite;
        z-index: -1;
    }

    @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
    }

    .dashboard { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 25px; z-index: 1; }

    .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .main-display { text-align: center; position: relative; overflow: hidden; }

    h1 { font-size: 1.2rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }

    .ticking-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 4rem;
        font-weight: 700;
        background: linear-gradient(to right, #38bdf8, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
    }

    .rupee { font-family: 'Segoe UI', Arial, sans-serif; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    .static-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
    }

    .static-title { color: #64748b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    .static-value { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; color: #e2e8f0; }

    .live-usdt-card {
        background: linear-gradient(145deg, rgba(20, 184, 166, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
        border: 1px solid rgba(20, 184, 166, 0.3);
        box-shadow: 0 0 20px rgba(20, 184, 166, 0.1);
    }

    @media (max-width: 768px) {
        .grid-3 { grid-template-columns: 1fr; }
        .ticking-value { font-size: 2.5rem; }
    }
</style>
</head>
<body>

<div class="dashboard">
    <div class="glass-card main-display">
        <h1>Total Net Worth (Live)</h1>
        <div class="ticking-value" id="total-val"><span class="rupee">&#8377;</span>0.00000000</div>
    </div>

    <div class="grid-3">
        <div class="static-card">
            <div class="static-title">Equity</div>
            <div class="static-value"><span class="rupee">&#8377;</span>3,912.41</div>
        </div>
        <div class="static-card">
            <div class="static-title">Gold</div>
            <div class="static-value"><span class="rupee">&#8377;</span>389.74</div>
        </div>
        <div class="static-card">
            <div class="static-title">Cash</div>
            <div class="static-value"><span class="rupee">&#8377;</span>110.00</div>
        </div>
    </div>

    <div class="glass-card static-card live-usdt-card">
        <div class="static-title">USDT (Compounding @ 10%/yr)</div>
        <div class="static-value" id="usdt-val" style="color: #2dd4bf; font-size: 2.2rem; margin-top: 10px;"><span class="rupee">&#8377;</span>0.00000000</div>
    </div>
</div>

<script>
    const staticTotal = 3912.41 + 389.74 + 110.00;
    const initialUSDTQuantity = 2;
    const annualGrowthRate = 0.10;
    const secondsInYear = 31536000;
    const startTime = Date.now();
    let exchangeRateINR = 94.96; // Default fallback

    // Fetch live rate from Frankfurter
    async function fetchLiveRate() {
        try {
            const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=INR');
            const data = await response.json();
            exchangeRateINR = data.rates.INR;
        } catch (e) { console.error("API error, using fallback"); }
    }
    fetchLiveRate();

    function updateTicker() {
        const elapsedYears = (Date.now() - startTime) / (secondsInYear * 1000);
        const currentUSDTQuantity = initialUSDTQuantity * Math.exp(annualGrowthRate * elapsedYears);
        const currentUSDTValueINR = currentUSDTQuantity * exchangeRateINR;
        
        document.getElementById('usdt-val').innerHTML = '<span class="rupee">&#8377;</span>' + currentUSDTValueINR.toFixed(8);
        document.getElementById('total-val').innerHTML = '<span class="rupee">&#8377;</span>' + (staticTotal + currentUSDTValueINR).toFixed(8);
        
        requestAnimationFrame(updateTicker);
    }

    updateTicker();
</script>

</body>
</html>
